name: Spielplan aktualisieren

on:
  schedule:
    - cron: '0 * * * *'   # jede Stunde automatisch
  workflow_dispatch:        # manuell auslösbar über GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node 24, keine Deprecation-Warnung

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests icalendar

      - name: Spielplan scrapen
        run: python scrape_dbb.py

      - name: spiele.json committen (nur wenn geändert)
        run: |
          git config user.name  "BSG Spielplan Bot"
          git config user.email "bot@bsg-usingerland.de"
          git add spiele.json
          git diff --staged --quiet || git commit -m "Spielplan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
