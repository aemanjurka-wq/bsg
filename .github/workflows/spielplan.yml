name: Spielplan aktualisieren

on:
  schedule:
    - cron: '0 * * * *'   # jede Stunde
  workflow_dispatch:        # manuell auslösbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Playwright + Chromium installieren
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Spielplan scrapen
        run: python scrape_dbb.py

      - name: Ergebnis anzeigen
        run: cat spiele.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Gefunden: {d[\"anzahl\"]} Spiele, Stand: {d[\"aktualisiert\"]}')"

      - name: spiele.json committen (nur wenn geändert)
        run: |
          git config user.name  "BSG Spielplan Bot"
          git config user.email "bot@bsg-usingerland.de"
          git add spiele.json
          git diff --staged --quiet || git commit -m "Spielplan $(date -u '+%Y-%m-%d %H:%M UTC') — $(cat spiele.json | python3 -c 'import json,sys; print(json.load(sys.stdin)[\"anzahl\"])') Spiele"
          git push
