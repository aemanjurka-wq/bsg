name: Spielplan aktualisieren

on:
  schedule:
    - cron: '0 * * * *'   # jede Stunde
  workflow_dispatch:        # manuell auslösbar

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Playwright installieren
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Spielplan scrapen
        run: python scrape_dbb.py

      - name: spiele.json committen
        run: |
          git config user.name  "BSG Spielplan Bot"
          git config user.email "bot@bsg-usingerland.de"
          git add spiele.json
          git diff --staged --quiet || git commit -m "Spielplan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
