name: Spielplan aktualisieren

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Playwright installieren
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Spielplan scrapen
        run: python scrape_dbb.py

      - name: Debug-Dateien + spiele.json committen
        run: |
          ANZAHL=$(python3 -c "import json; print(json.load(open('spiele.json'))['anzahl'])")
          DATUM=$(date -u "+%Y-%m-%d %H:%M UTC")
          git config user.name "BSG Spielplan Bot"
          git config user.email "bot@bsg-usingerland.de"
          git add spiele.json debug_*.html debug_*.png
          git diff --staged --quiet || git commit -m "Spielplan ${DATUM} - ${ANZAHL} Spiele"
          git push
